<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moskvich Pokaz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #87CEEB;
            color: white;
        }

        #hud {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            pointer-events: none;
            user-select: none;
            min-width: 200px;
        }
        #hud .speed {
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b35;
        }
        #hud .speed small {
            font-size: 1rem;
            font-weight: 400;
            color: #888;
        }
        #hud .coords {
            font-size: 0.8rem;
            color: #88ddff;
            font-family: 'Courier New', monospace;
            margin-top: 4px;
        }
        #hud .model-name {
            font-size: 0.9rem;
            color: #ff6b35;
            font-weight: 500;
            margin-top: 2px;
        }

        #controls-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }
        #controls-hint strong {
            color: #fff;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 16px;
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading p {
            font-size: 1rem;
            opacity: 0.7;
        }

        #carSelector {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 180px;
        }
        #carSelector h4 {
            color: #888;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-align: center;
        }
        .car-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-weight: 400;
        }
        .car-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .car-btn.active {
            background: rgba(255, 107, 53, 0.2);
            border-color: #ff6b35;
        }
        .car-btn .emoji {
            margin-right: 8px;
        }

        @media (max-width: 768px) {
            #hud { padding: 8px 16px; min-width: auto; width: 90%; bottom: 16px; }
            #hud .speed { font-size: 1.5rem; }
            #controls-hint { font-size: 0.6rem; padding: 6px 14px; white-space: normal; max-width: 90%; top: 12px; }
            #carSelector { top: 70px; right: 10px; padding: 12px; min-width: 140px; }
            .car-btn { font-size: 0.75rem; padding: 6px 10px; }
        }
    </style>
</head>
<body>

    <div id="carSelector">
        <h4>🚗 Выбор машины</h4>
        <button class="car-btn active" data-car="subaru">🚙 Soobaro Out Black</button>
        <button class="car-btn" data-car="bmw">🚗 BEEMWA 22</button>
        <button class="car-btn" data-car="nissan">🚘 Neasun Loral 2rbo</button>
    </div>

    <div id="controls-hint">
        <strong>W / ↑</strong> — вперёд &nbsp;·&nbsp; <strong>S / ↓</strong> — назад &nbsp;·&nbsp; <strong>A / ←</strong> &nbsp;<strong>D / →</strong> — руль &nbsp;·&nbsp; <strong>Пробел</strong> — ручник
    </div>

    <div id="hud">
        <div class="speed"><span id="speedDisplay">0</span> <small>км/ч</small></div>
        <div class="coords" id="coordDisplay">📍 0.00 · 0.00 · 0.00</div>
        <div class="model-name" id="modelNameDisplay">🚙 Soobaro Out Black</div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loadStatus">Загрузка...</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --------------------------------------------------------------
        // 1. СЦЕНА, КАМЕРА, РЕНДЕРЕР
        // --------------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 40, 80);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        document.body.appendChild(renderer.domElement);

        // --------------------------------------------------------------
        // 2. ОСВЕЩЕНИЕ
        // --------------------------------------------------------------
        const sunLight = new THREE.DirectionalLight(0xffeedd, 2.5);
        sunLight.position.set(10, 15, 8);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 4096;
        sunLight.shadow.mapSize.height = 4096;
        sunLight.shadow.camera.near = 0.1;
        sunLight.shadow.camera.far = 60;
        sunLight.shadow.camera.left = -30;
        sunLight.shadow.camera.right = 30;
        sunLight.shadow.camera.top = 30;
        sunLight.shadow.camera.bottom = -30;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x88ccff, 0.8);
        fillLight.position.set(-5, 3, -8);
        scene.add(fillLight);

        const ambientLight = new THREE.AmbientLight(0x88bbdd, 0.8);
        scene.add(ambientLight);

        // --------------------------------------------------------------
        // 3. ГОРОД
        // --------------------------------------------------------------
        // --- Дороги ---
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.9 });
        const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });

        // Главные дороги (крест)
        const roadGeo = new THREE.PlaneGeometry(40, 6);
        const road1 = new THREE.Mesh(roadGeo, roadMat);
        road1.rotation.x = -Math.PI / 2;
        road1.position.set(0, -0.47, 0);
        road1.receiveShadow = true;
        scene.add(road1);

        const road2 = new THREE.Mesh(roadGeo, roadMat);
        road2.rotation.x = -Math.PI / 2;
        road2.rotation.z = Math.PI / 2;
        road2.position.set(0, -0.47, 0);
        road2.receiveShadow = true;
        scene.add(road2);

        // Разметка (центр)
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        for (let i = -18; i <= 18; i += 3) {
            if (Math.abs(i) < 1) continue;
            const line = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 1.5), lineMat);
            line.rotation.x = -Math.PI / 2;
            line.position.set(i, -0.46, 0);
            scene.add(line);
            
            const line2 = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 1.5), lineMat);
            line2.rotation.x = -Math.PI / 2;
            line2.position.set(0, -0.46, i);
            scene.add(line2);
        }

        // --- Здания ---
        function createBuilding(x, z, w, d, h, color) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ 
                color: color, 
                roughness: 0.6,
                metalness: 0.1
            });
            const building = new THREE.Mesh(geo, mat);
            building.position.set(x, h/2 - 0.5, z);
            building.castShadow = true;
            building.receiveShadow = true;
            scene.add(building);

            // Окна (простой эффект)
            const windowMat = new THREE.MeshBasicMaterial({ color: 0x88ccff });
            for (let i = 0; i < Math.floor(w/2); i++) {
                for (let j = 0; j < Math.floor(h/2); j++) {
                    const window = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.6), windowMat);
                    window.position.set(
                        x - w/2 + 0.8 + i * 1.2,
                        j * 1.2 + 0.6,
                        z + d/2 + 0.01
                    );
                    scene.add(window);
                    const window2 = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.6), windowMat);
                    window2.position.set(
                        x - w/2 + 0.8 + i * 1.2,
                        j * 1.2 + 0.6,
                        z - d/2 - 0.01
                    );
                    window2.rotation.y = Math.PI;
                    scene.add(window2);
                }
            }
        }

        // Кварталы зданий
        const buildingColors = [0x8B7355, 0xCD853F, 0xDEB887, 0xD2691E, 0xA0522D, 0x8B4513];
        
        // Северо-восточный квартал
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                const h = 1.5 + Math.random() * 3;
                const color = buildingColors[Math.floor(Math.random() * buildingColors.length)];
                createBuilding(5 + i * 3, -5 - j * 3, 2 + Math.random() * 1, 2 + Math.random() * 1, h, color);
            }
        }

        // Северо-западный квартал
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                const h = 1.5 + Math.random() * 3;
                const color = buildingColors[Math.floor(Math.random() * buildingColors.length)];
                createBuilding(-5 - i * 3, -5 - j * 3, 2 + Math.random() * 1, 2 + Math.random() * 1, h, color);
            }
        }

        // Юго-восточный квартал
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                const h = 1.5 + Math.random() * 3;
                const color = buildingColors[Math.floor(Math.random() * buildingColors.length)];
                createBuilding(5 + i * 3, 5 + j * 3, 2 + Math.random() * 1, 2 + Math.random() * 1, h, color);
            }
        }

        // Юго-западный квартал
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                const h = 1.5 + Math.random() * 3;
                const color = buildingColors[Math.floor(Math.random() * buildingColors.length)];
                createBuilding(-5 - i * 3, 5 + j * 3, 2 + Math.random() * 1, 2 + Math.random() * 1, h, color);
            }
        }

        // Тротуары
        const sideMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.9 });
        for (let i = -20; i <= 20; i += 4) {
            if (Math.abs(i) < 2) continue;
            const s1 = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 38), sideMat);
            s1.rotation.x = -Math.PI / 2;
            s1.position.set(i, -0.46, 0);
            scene.add(s1);
            
            const s2 = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 38), sideMat);
            s2.rotation.x = -Math.PI / 2;
            s2.position.set(0, -0.46, i);
            scene.add(s2);
        }

        // Газоны
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x4a8c3f, roughness: 0.9 });
        for (let i = -18; i <= 18; i += 8) {
            for (let j = -18; j <= 18; j += 8) {
                if (Math.abs(i) < 2 && Math.abs(j) < 2) continue;
                const g = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), grassMat);
                g.rotation.x = -Math.PI / 2;
                g.position.set(i, -0.47, j);
                scene.add(g);
            }
        }

        // Фонари
        function createLamppost(x, z) {
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8, roughness: 0.3 });
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 1.5), poleMat);
            pole.position.set(x, 0.25, z);
            scene.add(pole);
            
            const lampMat = new THREE.MeshStandardMaterial({ color: 0xffff88, emissive: 0xffff44, emissiveIntensity: 0.2 });
            const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), lampMat);
            lamp.position.set(x, 1.0, z);
            scene.add(lamp);
        }

        for (let i = -16; i <= 16; i += 8) {
            if (Math.abs(i) < 2) continue;
            createLamppost(i, -2.5);
            createLamppost(i, 2.5);
            createLamppost(-2.5, i);
            createLamppost(2.5, i);
        }

        // --------------------------------------------------------------
        // 4. ЗАГРУЗКА МОДЕЛЕЙ
        // --------------------------------------------------------------
        const loader = new GLTFLoader();
        const loadingDiv = document.getElementById('loading');
        const loadStatus = document.getElementById('loadStatus');

        let currentCar = null;
        let carLoaded = false;
        let currentModelId = 'subaru';

        const carState = {
            position: new THREE.Vector3(0, 0, 0),
            velocity: new THREE.Vector3(0, 0, 0),
            rotation: 0,
        };

        // Параметры управления (исправленные)
        const ENGINE_FORCE = 0.04;
        const REVERSE_FORCE = 0.025;
        const MAX_SPEED = 0.5;
        const TURN_SPEED = 0.03;
        const FRICTION = 0.98;

        const keys = {
            w: false,
            s: false,
            a: false,
            d: false,
            space: false,
            arrowup: false,
            arrowdown: false,
            arrowleft: false,
            arrowright: false,
        };

        const modelsList = [
            { id: 'subaru', name: '🚙 Soobaro Out Black', file: 'subaru_outback.glb', rotation: 0 },
            { id: 'bmw', name: '🚗 BEEMWA 22', file: 'bmw2002.glb', rotation: 0 },
            { id: 'nissan', name: '🚘 Neasun Loral 2rbo', file: 'nissan_laurel.glb', rotation: Math.PI / 2 }
        ];

        const loadedModels = {};

        function loadModel(modelId, filePath) {
            return new Promise((resolve, reject) => {
                const modelInfo = modelsList.find(m => m.id === modelId);
                loadStatus.textContent = `Загрузка ${modelInfo.name}...`;

                loader.load(
                    filePath,
                    (gltf) => {
                        const model = gltf.scene;

                        const box = new THREE.Box3().setFromObject(model);
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const targetSize = 2.0;
                        if (maxDim > 0.01) {
                            const s = targetSize / maxDim;
                            model.scale.set(s, s, s);
                        }

                        const center = new THREE.Vector3();
                        box.getCenter(center);
                        model.position.sub(center);
                        
                        model.position.x = 0;
                        model.position.y = 0;
                        model.position.z = 0;

                        // Поворот модели (для Nissan)
                        model.rotation.y = modelInfo.rotation || 0;

                        model.traverse((child) => {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                                if (child.material) {
                                    child.material.roughness = 0.3;
                                    child.material.metalness = 0.5;
                                }
                            }
                        });

                        scene.add(model);
                        resolve(model);
                    },
                    (xhr) => {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        loadStatus.textContent = `Загрузка... ${percent}%`;
                    },
                    (error) => {
                        console.error('Ошибка загрузки:', error);
                        reject(error);
                    }
                );
            });
        }

        async function init() {
            try {
                for (const model of modelsList) {
                    try {
                        const modelObj = await loadModel(model.id, model.file);
                        loadedModels[model.id] = modelObj;
                        if (model.id !== modelsList[0].id) {
                            modelObj.visible = false;
                        }
                        console.log(`✅ ${model.name} загружен`);
                    } catch (e) {
                        console.warn(`❌ Ошибка загрузки ${model.name}:`, e);
                    }
                }

                const firstModel = modelsList[0];
                if (loadedModels[firstModel.id]) {
                    currentCar = loadedModels[firstModel.id];
                    currentModelId = firstModel.id;
                    carLoaded = true;
                    document.getElementById('modelNameDisplay').textContent = firstModel.name;
                }

                loadingDiv.style.display = 'none';
                console.log('✅ Все модели загружены!');
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                loadingDiv.innerHTML = `
                    <p style="color: #ff6b35; font-weight: 500;">
                        ❌ Не удалось загрузить модели.<br>
                        Проверьте пути к файлам.
                    </p>
                `;
            }
        }

        init();

        // --------------------------------------------------------------
        // 5. ВЫБОР МАШИНЫ
        // --------------------------------------------------------------
        document.querySelectorAll('.car-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.dataset.car;
                if (!loadedModels[id]) return;

                // Скрываем текущую
                if (currentCar) {
                    currentCar.visible = false;
                }

                // Показываем новую
                currentCar = loadedModels[id];
                currentCar.visible = true;
                currentModelId = id;
                
                // Обновляем активную кнопку
                document.querySelectorAll('.car-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Обновляем название
                const modelInfo = modelsList.find(m => m.id === id);
                document.getElementById('modelNameDisplay').textContent = modelInfo.name;

                // Сбрасываем позицию
                carState.position.set(0, 0, 0);
                carState.velocity.set(0, 0, 0);
                carState.rotation = 0;
                currentCar.position.set(0, 0, 0);
                currentCar.rotation.y = modelInfo.rotation || 0;
            });
        });

        // --------------------------------------------------------------
        // 6. УПРАВЛЕНИЕ (исправленное)
        // --------------------------------------------------------------
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            // WASD
            if (key === 'w') { keys.w = true; e.preventDefault(); }
            if (key === 's') { keys.s = true; e.preventDefault(); }
            if (key === 'a') { keys.a = true; e.preventDefault(); }
            if (key === 'd') { keys.d = true; e.preventDefault(); }
            
            // Стрелки
            if (e.key === 'ArrowUp') { keys.arrowup = true; e.preventDefault(); }
            if (e.key === 'ArrowDown') { keys.arrowdown = true; e.preventDefault(); }
            if (e.key === 'ArrowLeft') { keys.arrowleft = true; e.preventDefault(); }
            if (e.key === 'ArrowRight') { keys.arrowright = true; e.preventDefault(); }
            
            if (e.key === ' ') { keys.space = true; e.preventDefault(); }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            
            if (key === 'w') { keys.w = false; e.preventDefault(); }
            if (key === 's') { keys.s = false; e.preventDefault(); }
            if (key === 'a') { keys.a = false; e.preventDefault(); }
            if (key === 'd') { keys.d = false; e.preventDefault(); }
            
            if (e.key === 'ArrowUp') { keys.arrowup = false; e.preventDefault(); }
            if (e.key === 'ArrowDown') { keys.arrowdown = false; e.preventDefault(); }
            if (e.key === 'ArrowLeft') { keys.arrowleft = false; e.preventDefault(); }
            if (e.key === 'ArrowRight') { keys.arrowright = false; e.preventDefault(); }
            
            if (e.key === ' ') { keys.space = false; e.preventDefault(); }
        });

        function updateCar() {
            if (!currentCar || !carLoaded) return;

            const { position, velocity, rotation } = carState;

            let acceleration = 0;
            let turn = 0;

            // W или стрелка вверх = вперёд
            if (keys.w || keys.arrowup) {
                acceleration = ENGINE_FORCE;
            }
            
            // S или стрелка вниз = назад
            if (keys.s || keys.arrowdown) {
                acceleration = -REVERSE_FORCE;
            }

            // A/D и стрелки для поворота
            if (keys.a || keys.arrowleft) turn = TURN_SPEED;
            if (keys.d || keys.arrowright) turn = -TURN_SPEED;

            if (Math.abs(velocity.length()) > 0.005) {
                carState.rotation += turn;
            }

            const forward = new THREE.Vector3(-Math.sin(rotation), 0, -Math.cos(rotation));
            velocity.add(forward.clone().multiplyScalar(acceleration));

            const currentSpeed = velocity.length();
            if (currentSpeed > MAX_SPEED) {
                velocity.multiplyScalar(MAX_SPEED / currentSpeed);
            }

            velocity.multiplyScalar(FRICTION);

            if (velocity.length() < 0.001) {
                velocity.set(0, 0, 0);
            }

            position.add(velocity);

            const BOUNDARY = 18;
            if (Math.abs(position.x) > BOUNDARY) {
                position.x = Math.sign(position.x) * BOUNDARY;
                velocity.x = 0;
            }
            if (Math.abs(position.z) > BOUNDARY) {
                position.z = Math.sign(position.z) * BOUNDARY;
                velocity.z = 0;
            }

            currentCar.position.copy(position);
            
            // Учитываем начальный поворот модели
            const modelInfo = modelsList.find(m => m.id === currentModelId);
            const baseRotation = modelInfo ? modelInfo.rotation || 0 : 0;
            currentCar.rotation.y = rotation + baseRotation;

            if (Math.abs(turn) > 0.001 && velocity.length() > 0.05) {
                const tilt = -turn * velocity.length() * 0.5;
                currentCar.rotation.z = tilt;
            } else {
                currentCar.rotation.z *= 0.9;
            }

            currentCar.position.y = 0 + Math.sin(Date.now() / 500) * 0.002;

            const speedKmh = Math.round(velocity.length() * 150);
            document.getElementById('speedDisplay').textContent = speedKmh;

            document.getElementById('coordDisplay').textContent =
                `📍 ${position.x.toFixed(2)} · ${position.y.toFixed(2)} · ${position.z.toFixed(2)}`;
        }

        // --------------------------------------------------------------
        // 7. КАМЕРА ОТ ТРЕТЬЕГО ЛИЦА
        // --------------------------------------------------------------
        const CAMERA_DISTANCE = 5;
        const CAMERA_HEIGHT = 3;
        const CAMERA_SMOOTH = 0.1;

        let cameraTarget = new THREE.Vector3(0, 0.5, 0);

        function updateCamera() {
            if (!currentCar || !carLoaded) return;

            const carPos = currentCar.position.clone();
            
            const angle = carState.rotation;
            const offset = new THREE.Vector3(
                -Math.sin(angle) * CAMERA_DISTANCE,
                CAMERA_HEIGHT,
                -Math.cos(angle) * CAMERA_DISTANCE
            );
            
            const desiredPos = carPos.clone().add(offset);
            camera.position.lerp(desiredPos, CAMERA_SMOOTH);

            const lookTarget = carPos.clone();
            lookTarget.y += 0.5;
            cameraTarget.lerp(lookTarget, CAMERA_SMOOTH);
            camera.lookAt(cameraTarget);
        }

        // --------------------------------------------------------------
        // 8. АДАПТАЦИЯ ПОД ОКНО
        // --------------------------------------------------------------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --------------------------------------------------------------
        // 9. АНИМАЦИОННЫЙ ЦИКЛ
        // --------------------------------------------------------------
        function animate() {
            requestAnimationFrame(animate);

            updateCar();
            updateCamera();

            renderer.render(scene, camera);
        }
        animate();

        console.log('🚗 Городской симулятор запущен!');
        console.log('📍 Спавн в центре (0, 0, 0)');
        console.log('📖 Управление: W/↑-вперёд, S/↓-назад, A/←, D/→-руль, Пробел-ручник');
    </script>
</body>
</html>
