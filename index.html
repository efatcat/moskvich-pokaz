<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Гоночный симулятор — A-Frame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: #fff;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 16px 24px;
            border-radius: 14px;
            border-left: 4px solid #ff6b35;
            pointer-events: none;
            user-select: none;
        }
        #ui h1 {
            font-size: 1.4rem;
            font-weight: 500;
        }
        #ui h1 span {
            color: #ff6b35;
        }
        #ui .sub {
            font-size: 0.85rem;
            opacity: 0.6;
            margin-top: 4px;
        }

        #carSelect {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 14px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #carSelect button {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: #fff;
            padding: 8px 22px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        #carSelect button:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        #carSelect button.active {
            background: #ff6b35;
            border-color: #ff6b35;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.2);
        }

        #controlsHint {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            text-align: center;
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            user-select: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading p {
            font-size: 1.1rem;
            opacity: 0.7;
        }

        @media (max-width: 700px) {
            #ui { top: 12px; left: 12px; padding: 12px 16px; }
            #ui h1 { font-size: 1.1rem; }
            #carSelect { bottom: 20px; padding: 8px 14px; gap: 8px; flex-wrap: wrap; justify-content: center; }
            #carSelect button { font-size: 0.8rem; padding: 6px 14px; }
            #controlsHint { bottom: 80px; font-size: 0.7rem; padding: 4px 12px; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>🚗 <span id="carName">Moskotch 21 41</span></h1>
        <div class="sub">WASD / Стрелки — управление</div>
    </div>

    <div id="carSelect">
        <button id="btnMoskotch" class="active">Moskotch 21 41</button>
        <button id="btnSubaru">Siburoo Outblack</button>
    </div>

    <div id="controlsHint">W / ↑ — вперёд &nbsp; S / ↓ — назад &nbsp; A/D / ←/→ — поворот</div>

    <div id="loading">
        <div class="spinner"></div>
        <p>Загрузка моделей...</p>
    </div>

    <!-- Подключаем A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- Компонент для управления автомобилем -->
    <script>
        AFRAME.registerComponent('car-controls', {
            schema: {
                speed: { type: 'number', default: 0 },
                maxSpeed: { type: 'number', default: 0.15 },
                acceleration: { type: 'number', default: 0.005 },
                friction: { type: 'number', default: 0.97 },
                turnSpeed: { type: 'number', default: 0.02 }
            },

            init: function() {
                this.speed = 0;
                this.keys = {
                    w: false,
                    a: false,
                    s: false,
                    d: false,
                    up: false,
                    down: false,
                    left: false,
                    right: false
                };

                // Подписка на события клавиатуры
                document.addEventListener('keydown', (e) => {
                    const key = e.key.toLowerCase();
                    if (key === 'w') this.keys.w = true;
                    if (key === 'a') this.keys.a = true;
                    if (key === 's') this.keys.s = true;
                    if (key === 'd') this.keys.d = true;
                    if (key === 'arrowup') { this.keys.up = true;
                        e.preventDefault(); }
                    if (key === 'arrowdown') { this.keys.down = true;
                        e.preventDefault(); }
                    if (key === 'arrowleft') { this.keys.left = true;
                        e.preventDefault(); }
                    if (key === 'arrowright') { this.keys.right = true;
                        e.preventDefault(); }
                });

                document.addEventListener('keyup', (e) => {
                    const key = e.key.toLowerCase();
                    if (key === 'w') this.keys.w = false;
                    if (key === 'a') this.keys.a = false;
                    if (key === 's') this.keys.s = false;
                    if (key === 'd') this.keys.d = false;
                    if (key === 'arrowup') { this.keys.up = false;
                        e.preventDefault(); }
                    if (key === 'arrowdown') { this.keys.down = false;
                        e.preventDefault(); }
                    if (key === 'arrowleft') { this.keys.left = false;
                        e.preventDefault(); }
                    if (key === 'arrowright') { this.keys.right = false;
                        e.preventDefault(); }
                });
            },

            tick: function() {
                const el = this.el;
                const data = this.data;

                // Определяем ускорение
                let accel = 0;
                if (this.keys.w || this.keys.up) accel = data.acceleration;
                if (this.keys.s || this.keys.down) accel = -data.acceleration;

                // Определяем поворот
                let turn = 0;
                if (this.keys.a || this.keys.left) turn = data.turnSpeed;
                if (this.keys.d || this.keys.right) turn = -data.turnSpeed;

                // Поворачиваем машину
                if (turn !== 0) {
                    const rot = el.getAttribute('rotation');
                    el.setAttribute('rotation', {
                        x: rot.x,
                        y: rot.y + turn,
                        z: rot.z
                    });
                }

                // Обновляем скорость
                this.speed += accel;
                if (this.speed > data.maxSpeed) this.speed = data.maxSpeed;
                if (this.speed < -data.maxSpeed * 0.5) this.speed = -data.maxSpeed * 0.5;
                if (!accel) this.speed *= data.friction;
                if (Math.abs(this.speed) < 0.0005) this.speed = 0;

                // Двигаем машину вперёд по её локальной оси Z
                if (Math.abs(this.speed) > 0.0005) {
                    const forward = new THREE.Vector3(0, 0, -1);
                    const quaternion = new THREE.Quaternion();
                    const euler = new THREE.Euler(
                        THREE.MathUtils.degToRad(el.getAttribute('rotation').x || 0),
                        THREE.MathUtils.degToRad(el.getAttribute('rotation').y || 0),
                        THREE.MathUtils.degToRad(el.getAttribute('rotation').z || 0)
                    );
                    quaternion.setFromEuler(euler);
                    forward.applyQuaternion(quaternion);

                    const pos = el.getAttribute('position');
                    el.setAttribute('position', {
                        x: pos.x + forward.x * this.speed,
                        y: pos.y,
                        z: pos.z + forward.z * this.speed
                    });
                }
            }
        });

        // Компонент для камеры, следящей за машиной
        AFRAME.registerComponent('follow-car', {
            schema: {
                target: { type: 'selector' },
                offset: { type: 'vec3', default: { x: 0, y: 6, z: -10 } },
                smoothness: { type: 'number', default: 0.08 }
            },

            tick: function() {
                if (!this.data.target) return;

                const targetPos = this.data.target.getAttribute('position');
                const targetRot = this.data.target.getAttribute('rotation');

                // Вычисляем смещение с учётом поворота машины
                const offset = new THREE.Vector3(
                    this.data.offset.x,
                    this.data.offset.y,
                    this.data.offset.z
                );

                const quaternion = new THREE.Quaternion();
                const euler = new THREE.Euler(
                    THREE.MathUtils.degToRad(targetRot.x || 0),
                    THREE.MathUtils.degToRad(targetRot.y || 0),
                    THREE.MathUtils.degToRad(targetRot.z || 0)
                );
                quaternion.setFromEuler(euler);
                offset.applyQuaternion(quaternion);

                // Целевая позиция камеры
                const targetCamPos = new THREE.Vector3(
                    targetPos.x + offset.x,
                    targetPos.y + offset.y,
                    targetPos.z + offset.z
                );

                // Плавное движение камеры
                const el = this.el;
                const currentPos = el.getAttribute('position');
                el.setAttribute('position', {
                    x: currentPos.x + (targetCamPos.x - currentPos.x) * this.data.smoothness,
                    y: currentPos.y + (targetCamPos.y - currentPos.y) * this.data.smoothness,
                    z: currentPos.z + (targetCamPos.z - currentPos.z) * this.data.smoothness
                });

                // Смотрим на машину
                el.setAttribute('look-at', this.data.target.id);
            }
        });
    </script>

    <!-- Сцена A-Frame -->
    <a-scene 
        background="color: #1a1a2e" 
        renderer="colorManagement: true"
        fog="type: linear; color: #1a1a2e; far: 300"
    >

        <!-- Освещение -->
        <a-light type="ambient" color="#404060" intensity="0.5"></a-light>
        <a-light type="directional" color="#ffeedd" intensity="1.5" position="20 30 10" shadow="true"></a-light>
        <a-light type="directional" color="#4488ff" intensity="0.4" position="-10 5 -20"></a-light>

        <!-- Земля -->
        <a-plane 
            rotation="-90 0 0" 
            position="0 -0.5 0" 
            width="200" 
            height="200" 
            color="#2a2a4a" 
            receive-shadow="true"
        ></a-plane>

        <!-- Сетка -->
        <a-entity grid="color: #6688ff; size: 200; divisions: 40" position="0 -0.49 0"></a-entity>

        <!-- Стартовый круг -->
        <a-ring 
            radius-inner="1.5" 
            radius-outer="2.5" 
            color="#ff6b35" 
            opacity="0.2" 
            rotation="-90 0 0" 
            position="0 -0.48 0"
        ></a-ring>

        <!-- ===== МОСКВИЧ 2141 ===== -->
        <a-entity 
            id="moskotch"
            gltf-model="url(moskvich.glb)"
            position="-58.93 -0.08 -50.91"
            rotation="0 14.32 0"
            scale="1.2 1.2 1.2"
            car-controls
            shadow
        ></a-entity>

        <!-- ===== SUBARU OUTBACK ===== -->
        <a-entity 
            id="subaru"
            gltf-model="url(subaru_outback.glb)"
            position="0 0 0"
            rotation="0 0 0"
            scale="0.9 0.9 0.9"
            car-controls
            shadow
            visible="false"
        ></a-entity>

        <!-- Камера, следящая за машиной -->
        <a-entity 
            id="camera"
            camera="fov: 50"
            position="0 6 -10"
            follow-car="target: #moskotch; offset: 0 6 -10; smoothness: 0.08"
            look-at="#moskotch"
        ></a-entity>

    </a-scene>

    <!-- Логика переключения машин -->
    <script>
        const scene = document.querySelector('a-scene');
        const moskotch = document.getElementById('moskotch');
        const subaru = document.getElementById('subaru');
        const camera = document.getElementById('camera');
        const carName = document.getElementById('carName');

        let activeCar = 'moskotch';

        function switchCar(name) {
            if (activeCar === name) return;

            // Скрываем текущую машину
            if (activeCar === 'moskotch') {
                moskotch.setAttribute('visible', 'false');
            } else {
                subaru.setAttribute('visible', 'false');
            }

            // Показываем новую
            if (name === 'moskotch') {
                subaru.setAttribute('visible', 'false');
                moskotch.setAttribute('visible', 'true');
                // Переносим позицию
                const pos = subaru.getAttribute('position');
                const rot = subaru.getAttribute('rotation');
                moskotch.setAttribute('position', pos);
                moskotch.setAttribute('rotation', rot);
                // Меняем цель камеры
                camera.setAttribute('follow-car', 'target', '#moskotch');
                camera.setAttribute('look-at', '#moskotch');
                carName.textContent = 'Moskotch 21 41';
                activeCar = 'moskotch';
            } else {
                moskotch.setAttribute('visible', 'false');
                subaru.setAttribute('visible', 'true');
                // Переносим позицию
                const pos = moskotch.getAttribute('position');
                const rot = moskotch.getAttribute('rotation');
                subaru.setAttribute('position', pos);
                subaru.setAttribute('rotation', rot);
                // Меняем цель камеры
                camera.setAttribute('follow-car', 'target', '#subaru');
                camera.setAttribute('look-at', '#subaru');
                carName.textContent = 'Siburoo Outblack';
                activeCar = 'subaru';
            }

            // Обновляем кнопки
            document.getElementById('btnMoskotch').classList.toggle('active', name === 'moskotch');
            document.getElementById('btnSubaru').classList.toggle('active', name === 'subaru');
        }

        document.getElementById('btnMoskotch').addEventListener('click', () => switchCar('moskotch'));
        document.getElementById('btnSubaru').addEventListener('click', () => switchCar('subaru'));

        // Скрываем загрузку после того, как модели загрузятся
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 3000);

        console.log('🚗 Гоночный симулятор на A-Frame запущен!');
        console.log('📍 Москвич стартует в (-58.93, -0.08, -50.91) с поворотом 14.32°');
    </script>
</body>
</html>
