<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Москвич 2141 — 3D-просмотр</title>
    <style>
        /* ---- Сброс и фон ---- */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #0a0a1a;
            color: white;
        }

        /* ---- Информация в углу ---- */
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            padding: 16px 24px;
            border-radius: 12px;
            border-left: 4px solid #ff6b35;
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }
        #info h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        #info h1 small {
            font-size: 1rem;
            font-weight: 300;
            color: #aaa;
            display: block;
            margin-top: 4px;
        }

        /* ---- Кнопка управления ---- */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 16px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #controls button {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        #controls button:hover {
            background: #ff6b35;
            border-color: #ff6b35;
            transform: scale(1.02);
        }
        #controls button:active {
            transform: scale(0.95);
        }
        #controls button.active {
            background: #ff6b35;
            border-color: #ff6b35;
        }

        /* ---- Индикатор загрузки ---- */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading p {
            font-size: 1.1rem;
            opacity: 0.7;
            margin: 0;
        }

        /* ---- Адаптивность ---- */
        @media (max-width: 600px) {
            #info { top: 12px; left: 12px; padding: 12px 16px; }
            #info h1 { font-size: 1.2rem; }
            #controls { bottom: 20px; padding: 8px 14px; gap: 10px; flex-wrap: wrap; justify-content: center; }
            #controls button { font-size: 0.8rem; padding: 6px 14px; }
        }
    </style>
</head>
<body>

    <!-- Информация -->
    <div id="info">
        <h1>Москвич 2141 <small>3D-модель</small></h1>
    </div>

    <!-- Кнопки управления -->
    <div id="controls">
        <button id="btnAutoRotate" class="active">⟳ Авто-вращение</button>
        <button id="btnReset">⟲ Сброс камеры</button>
    </div>

    <!-- Индикатор загрузки -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Загрузка модели...</p>
    </div>

    <!-- Подключаем Three.js через importmap -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ----- Импорты -----
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ----- 1. Сцена, камера, рендерер -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a); // тёмно-синий

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // ограничим для производительности
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ----- 2. Управление (OrbitControls) -----
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;
        controls.minDistance = 1.5;
        controls.maxDistance = 15;
        controls.target.set(0, 0.3, 0);
        controls.update();

        // ----- 3. Освещение -----
        // Фоновый свет
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);

        // Основной направленный свет (с тенями)
        const dirLight = new THREE.DirectionalLight(0xffeedd, 2.5);
        dirLight.position.set(5, 8, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // Заполняющий свет сзади
        const backLight = new THREE.DirectionalLight(0x4488ff, 0.8);
        backLight.position.set(-3, 1, -5);
        scene.add(backLight);

        // Точечный свет снизу для красоты
        const fillLight = new THREE.PointLight(0xff6633, 0.5, 10);
        fillLight.position.set(0, -1, 2);
        scene.add(fillLight);

        // Пол (прозрачная сетка для референса)
        const gridHelper = new THREE.GridHelper(6, 12, 0x8888ff, 0x444466);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);

        // ----- 4. Загрузка модели -----
        const loader = new GLTFLoader();
        const loadingDiv = document.getElementById('loading');

        let model = null; // ссылка на модель для возможных манипуляций

        loader.load(
            'moskvich.glb',
            (gltf) => {
                model = gltf.scene;

                // Масштабируем, если модель слишком крупная/мелкая
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                if (maxDim > 2.5) {
                    const scale = 2.5 / maxDim;
                    model.scale.set(scale, scale, scale);
                }

                // Центрируем модель
                const center = new THREE.Vector3();
                box.getCenter(center);
                model.position.sub(center);

                // Добавляем в сцену
                scene.add(model);

                // Убираем индикатор загрузки
                loadingDiv.style.display = 'none';
            },
            (xhr) => {
                // Прогресс загрузки (опционально)
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                const p = loadingDiv.querySelector('p');
                if (p) p.textContent = `Загрузка... ${percent}%`;
            },
            (error) => {
                console.error('Ошибка загрузки модели:', error);
                loadingDiv.innerHTML = `
                    <p style="color: #ff6b35; font-weight: 500;">
                        ❌ Не удалось загрузить модель.<br>
                        Проверьте путь к файлу <code>moskvich.glb</code>.
                    </p>
                `;
            }
        );

        // ----- 5. Управление кнопками -----
        const btnAutoRotate = document.getElementById('btnAutoRotate');
        const btnReset = document.getElementById('btnReset');

        btnAutoRotate.addEventListener('click', () => {
            controls.autoRotate = !controls.autoRotate;
            btnAutoRotate.classList.toggle('active');
            btnAutoRotate.textContent = controls.autoRotate ? '⟳ Авто-вращение' : '⟳ Вращение выкл.';
        });

        btnReset.addEventListener('click', () => {
            camera.position.set(4, 3, 6);
            controls.target.set(0, 0.3, 0);
            controls.update();
        });

        // ----- 6. Адаптация под размер окна -----
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ----- 7. Анимационный цикл -----
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // обязательно при enabledDamping = true
            renderer.render(scene, camera);
        }
        animate();

        // ----- 8. (Доп.) Отладка в консоли -----
        console.log('🟢 Просмотрщик Москвич 2141 запущен. Управление мышью: вращение, скролл — приближение.');
    </script>
</body>
</html>
